user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Markdown for Agents — register the .md extension so when we serve the
    # markdown twin of a page nginx sets Content-Type: text/markdown.
    # https://developers.cloudflare.com/fundamentals/reference/markdown-for-agents/
    types {
        text/markdown md;
    }
    charset_types text/html text/markdown text/plain application/javascript application/json;
    charset utf-8;

    # Markdown negotiation: when an agent sends `Accept: text/markdown`, prefer
    # the .md sibling of the requested page. Browsers (Accept: text/html,...)
    # continue to get HTML — it's the default.
    map $http_accept $md_suffix {
        default       "";
        "~*text/markdown" ".md";
    }

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/markdown text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/rss+xml font/truetype font/opentype
               application/vnd.ms-fontobject image/svg+xml;
    gzip_min_length 1000;

    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # Security headers
        # NOTE: X-XSS-Protection removed — legacy (Chrome dropped support in 2019).
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        # Content Security Policy. 'unsafe-inline' is needed for the theme/nav inline scripts
        # in BaseLayout.astro. img-src includes youtube/i.ytimg for video schema thumbnails.
        # frame-src allows the YouTube and VK video embed domains used by VKVideo and
        # inline <iframe> blocks on /cosplay, /it, /other — without it the browser's
        # default-src 'self' fallback blocks them with "Этот контент заблокирован".
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://img.youtube.com https://i.ytimg.com; font-src 'self'; connect-src 'self'; frame-src 'self' https://www.youtube.com https://www.youtube-nocookie.com https://vk.com; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;
        # Signal to caches/CDNs that the response depends on the Accept header
        # (HTML vs. Markdown content negotiation).
        add_header Vary "Accept" always;
        # Link headers for agent discovery (RFC 8288). Advertise the llms.txt
        # descriptor and XML sitemap so AI agents can find the site structure
        # without scraping HTML. Both rel values are IANA-registered.
        add_header Link "</llms.txt>; rel=\"describedby\"; type=\"text/plain\"" always;
        add_header Link "</sitemap-index.xml>; rel=\"sitemap\"; type=\"application/xml\"" always;

        # Cache static assets
        # IMPORTANT: nginx's `add_header` inheritance breaks when a child location
        # block uses its own `add_header` — all parent headers silently drop.
        # So we must REPEAT the full security header set inside this block.
        location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|webp|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable" always;
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://img.youtube.com https://i.ytimg.com; font-src 'self'; connect-src 'self'; frame-src 'self' https://www.youtube.com https://www.youtube-nocookie.com https://vk.com; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;
        }

        # Main location block - handle Astro routing.
        # Final =404 fallback returns a real HTTP 404 (not a soft-404 with index.html)
        # so unknown URLs aren't indexed by Google as duplicates of the homepage.
        #
        # Markdown negotiation: $md_suffix is ".md" when the client sent
        # `Accept: text/markdown`, empty otherwise. With markdown preferred we
        # probe the .md twins first (scripts/generate-markdown.ts emits them at
        # build time); without it the empty suffix short-circuits to HTML.
        location / {
            try_files $uri$md_suffix $uri/index$md_suffix $uri $uri/ $uri.html =404;
        }

        # Handle English routes (same negotiation rules).
        location /en {
            try_files $uri$md_suffix $uri/index$md_suffix $uri $uri/ $uri.html =404;
        }

        # Ensure .md responses keep the full security+Vary header set. nginx's
        # add_header inheritance is all-or-nothing per location, so we repeat
        # the server-level headers here — otherwise they'd drop for markdown.
        #
        # Content-Type is set by the `types { text/markdown md; }` directive at
        # the http{} level; we add charset + Vary here. x-markdown-tokens is
        # intentionally omitted — vanilla nginx can't read the `.md.tokens`
        # sidecar into a header without an extra module. The sidecars are still
        # emitted by generate-markdown.ts so a CDN (Cloudflare) or njs layer
        # upstream can surface them later without rebuilding the site.
        location ~ \.md$ {
            add_header Content-Type "text/markdown; charset=utf-8" always;
            add_header Vary "Accept" always;
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
            add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
            add_header Link "</llms.txt>; rel=\"describedby\"; type=\"text/plain\"" always;
            add_header Link "</sitemap-index.xml>; rel=\"sitemap\"; type=\"application/xml\"" always;
        }

        # Don't expose the token-count sidecars directly — they're metadata
        # consumed by upstream proxies, not a public resource.
        location ~ \.md\.tokens$ {
            return 404;
        }

        # Error pages — Astro emits dist/404.html from src/pages/404.astro
        error_page 404 /404.html;
        location = /404.html {
            internal;
        }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
